name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # Check out repository under $GITHUB_WORKSPACE, so the job can access it
    - name: Checkout code
      uses: actions/checkout@v6

    # Run using Python 3.8 for consistency and aiohttp
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'
        architecture: 'x64'
        cache: 'pip'

    # Install dependencies with `pip`
    - name: Install requirements
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install -r requirements.txt

    # Run main.py to check for errors (headless mode with xvfb)
    - name: Run main.py to check for errors
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        # Run with virtual display, timeout after 10 seconds (GUI won't exit by itself)
        # Exit code 124 means timeout (expected), other non-zero codes indicate errors
        timeout 10 xvfb-run --auto-servernum python3 main.py || [ $? -eq 124 ]
