name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

      # Check out repository
      - name: Checkout code
        uses: actions/checkout@v6

      # Set up Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'

      # Install dependencies with pip
      - name: Install requirements
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      # Syntax check - core modules
      - name: Syntax check - core modules
        shell: bash
        run: |
          echo "Checking syntax for core modules..."
          python -m py_compile config.py
          python -m py_compile toolbox.py
          python -m py_compile main.py
          python -m py_compile settings_page.py
          python -m py_compile build.py
          echo "OK: Core modules syntax check passed"

      # Syntax check - common modules
      - name: Syntax check - common modules
        shell: bash
        run: |
          echo "Checking syntax for common modules..."
          for file in common/*.py; do
            [ -f "$file" ] && python -m py_compile "$file"
          done
          echo "OK: Common modules syntax check passed"

      # Syntax check - plugin modules
      - name: Syntax check - plugin modules
        shell: bash
        run: |
          echo "Checking syntax for plugin modules..."
          for file in plugins/*.py; do
            [ -f "$file" ] && python -m py_compile "$file"
          done
          echo "OK: Plugin modules syntax check passed"

      # Syntax check - test files
      - name: Syntax check - test files
        shell: bash
        run: |
          echo "Checking syntax for test files..."
          if [ -d "test" ]; then
            for file in test/*.py; do
              [ -f "$file" ] && python -m py_compile "$file"
            done
          fi
          echo "OK: Test files syntax check passed"

      # Run main.py to check for errors (timeout after 10 seconds)
      - name: Run main.py to check for errors
        shell: pwsh
        run: |
          echo "Starting main.py to verify it can launch..."
          $process = Start-Process -FilePath "python" -ArgumentList "main.py" -PassThru
          $pid = $process.Id
          echo "Started main.py with PID $pid"
          Start-Sleep -Seconds 10
          # Check if process is still running
          $running = Get-Process -Id $pid -ErrorAction SilentlyContinue
          if ($running) {
            echo "OK: main.py started successfully (still running as expected)"
            Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue
            exit 0
          } else {
            echo "ERROR: main.py exited unexpectedly"
            exit 1
          }
