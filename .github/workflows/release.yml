name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      app_name: ${{ steps.version.outputs.app_name }}
      description: ${{ steps.version.outputs.description }}

    env:
      PYTHONUTF8: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Get version info
        id: version
        run: |
          python scripts/get_version.py version app_name description

      - name: Syntax check - core modules
        run: |
          echo "Checking syntax for core modules..."
          python -m py_compile config.py
          python -m py_compile toolbox.py
          python -m py_compile main.py
          python -m py_compile settings_page.py
          python -m py_compile build.py
          echo "OK: Core modules syntax check passed"

      - name: Syntax check - common modules
        shell: bash
        run: |
          echo "Checking syntax for common modules..."
          for file in common/*.py; do
            [ -f "$file" ] && python -m py_compile "$file"
          done
          echo "OK: Common modules syntax check passed"

      - name: Syntax check - plugin modules
        shell: bash
        run: |
          echo "Checking syntax for plugin modules..."
          for file in plugins/*.py; do
            [ -f "$file" ] && python -m py_compile "$file"
          done
          echo "OK: Plugin modules syntax check passed"

      - name: Verify main.py import
        run: |
          python -c "import sys; sys.path.insert(0, '.'); import main; print('Verification passed')"

      - name: Install pandoc
        run: choco install pandoc -y --no-progress

      - name: Build
        timeout-minutes: 15
        run: |
          echo "Running build.py to create package..."
          python build.py
          echo "OK: build.py completed successfully"

      - name: Generate release notes
        id: notes
        run: |
          python scripts/generate_notes.py ${{ github.ref_name }}

      - name: Upload manual for macOS
        uses: actions/upload-artifact@v7
        with:
          name: manual-docx
          path: dist/manual-*.docx
          retention-days: 1

      - name: Package Windows release
        id: package_win
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="工具箱ToolBox-win-${VERSION}.zip"
          echo "Creating ${ZIP_NAME}..."
          cd dist
          7z a "../${ZIP_NAME}" "工具箱ToolBox-v${VERSION}.exe"
          [ -f "manual-${VERSION}.docx" ] && 7z a "../${ZIP_NAME}" "manual-${VERSION}.docx"
          cd ..
          echo "zip_file=${ZIP_NAME}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: 工具箱 v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.content }}
          files: ${{ steps.package_win.outputs.zip_file }}
          draft: false
          prerelease: false

  build-macos:
    runs-on: macos-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Get version info
        run: |
          python scripts/get_version.py version

      - name: Syntax check - core modules
        run: |
          echo "Checking syntax for core modules..."
          python -m py_compile config.py
          python -m py_compile toolbox.py
          python -m py_compile main.py
          python -m py_compile settings_page.py
          python -m py_compile build_macos.py
          echo "OK: Core modules syntax check passed"

      - name: Syntax check - common modules
        shell: bash
        run: |
          echo "Checking syntax for common modules..."
          for file in common/*.py; do
            [ -f "$file" ] && python -m py_compile "$file"
          done
          echo "OK: Common modules syntax check passed"

      - name: Syntax check - plugin modules
        shell: bash
        run: |
          echo "Checking syntax for plugin modules..."
          for file in plugins/*.py; do
            [ -f "$file" ] && python -m py_compile "$file"
          done
          echo "OK: Plugin modules syntax check passed"

      - name: Verify main.py import
        run: |
          python -c "import sys; sys.path.insert(0, '.'); import main; print('Verification passed')"

      - name: Build .app
        timeout-minutes: 15
        run: |
          echo "Running build_macos.py to create .app bundle..."
          python build_macos.py
          echo "OK: build_macos.py completed successfully"

      - name: Download manual from Windows
        uses: actions/download-artifact@v8
        with:
          name: manual-docx
          path: dist/

      - name: Package .app
        id: package
        run: |
          echo "Packaging .app bundle with manual..."
          VERSION="${GITHUB_REF#refs/tags/v}"

          APP_FILE=$(find dist -name "*.app" -type d | head -1)
          if [ -z "$APP_FILE" ]; then
            echo "ERROR: No .app file found!"
            exit 1
          fi

          APP_BASENAME="工具箱ToolBox-v${VERSION}.app"
          MANUAL_FILE=$(ls dist/manual-*.docx 2>/dev/null | head -1 || echo "")
          ARCHIVE_NAME="工具箱ToolBox-mac-${VERSION}.tar.gz"

          # Rename .app to match naming convention
          mv "$APP_FILE" "dist/${APP_BASENAME}"

          echo "App: $APP_BASENAME"
          echo "Manual: $MANUAL_FILE"
          echo "Archive: $ARCHIVE_NAME"

          cd dist
          TAR_FILES="${APP_BASENAME}"
          if [ -n "$MANUAL_FILE" ]; then
            TAR_FILES="${TAR_FILES} $(basename "$MANUAL_FILE")"
          fi
          tar czf "../${ARCHIVE_NAME}" ${TAR_FILES}
          cd ..

          echo "archive_file=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "OK: .app packaged successfully"

      - name: Upload macOS package to Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.package.outputs.archive_file }}
